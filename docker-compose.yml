version: '3.8'

services:
  # Distributed memory cache serving as our shared rate-limit ledger
  redis:
    image: redis:7.2-alpine
    container_name: distributed-redis
    ports:
      - "6379:6379"
    command: redis-server --loglevel warning
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Spring WebFlux API Gateway executing Token Bucket checks
  rate-limiter-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rate-limiter-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_PROFILES_ACTIVE=prod
      # Tweak default values in prod if necessary
      - APP_RATE_LIMITER_DEFAULT_CAPACITY=10
      - APP_RATE_LIMITER_DEFAULT_REFILL_RATE=2.0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gateway-network

networks:
  gateway-network:
    driver: bridge
